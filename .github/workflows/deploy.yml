name: 部署静态网站到 GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: 添加 .nojekyll 以禁用 Jekyll 处理
        run: touch .nojekyll

      - name: 配置 GitHub Pages
        uses: actions/configure-pages@v4

      - name: 上传站点文件
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

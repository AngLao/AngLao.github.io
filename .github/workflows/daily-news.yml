name: 每日新闻聚合与部署

on:
  schedule:
    - cron: "0 4 * * *"
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 安装依赖
        run: |
          pip install -r requirements.txt

      - name: 抓取新闻并构建站点
        run: |
          python -m src

      - name: 提交新闻归档
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/
          if git diff --staged --quiet; then echo "无更新"; exit 0; fi
          git commit -m "daily: $(date +'%Y-%m-%d') 新闻归档"
          git push

      - name: 配置 Pages
        uses: actions/configure-pages@v4

      - name: 上传站点
        uses: actions/upload-pages-artifact@v4
        with:
          path: "site"

      - name: 部署
        id: deployment
        uses: actions/deploy-pages@v4


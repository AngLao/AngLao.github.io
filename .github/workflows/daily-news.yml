name: 每日新闻聚合与部署

on:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 安装依赖
        run: |
          pip install -r requirements.txt

      - name: 抓取新闻并构建站点
        run: |
          python -m src

      - name: 配置 Pages
        uses: actions/configure-pages@v4

      - name: 上传站点
        uses: actions/upload-pages-artifact@v3
        with:
          path: "site"

      - name: 部署
        id: deployment
        uses: actions/deploy-pages@v4


name: Python Debug
on:
  push:
    paths:
      - '.github/workflows/debug.yml'
      - 'src/**'
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Test import
        run: python -c "from src.build_site import build; print('IMPORT OK')"
      - name: Run build
        run: python -m src.build_site
